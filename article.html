<script>
  (async function () {
    const el = document.getElementById("article");
    const id = new URLSearchParams(location.search).get("id");
    const post = id ? await niuGetPost(id) : null;
    if (!post) {
      el.innerHTML = '<p class="empty-posts">找不到這篇文章，它可能已被刪除。</p>';
      return;
    }
    document.title = post.title + "｜牛牛老師補給站";
    if (post.excerpt) {
      var desc = document.querySelector('meta[name="description"]');
      if (desc) desc.setAttribute("content", post.excerpt);
    }
    el.innerHTML =
      '<h1>' + (post.emoji ? post.emoji + " " : "") + post.title + '</h1>' +
      '<p class="article-meta">' + (post.date || "") + '｜牛牛老蘇</p>' +
      '<div class="article-body">' + post.html + '</div>';

    /* 注入文章結構化資料，利於搜尋引擎 */
    var ld = document.createElement("script");
    ld.type = "application/ld+json";
    ld.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": post.title,
      "description": post.excerpt || "",
      "datePublished": post.date || "",
      "author": { "@type": "Person", "name": "林溱桐", "alternateName": "牛牛老蘇" },
      "publisher": { "@type": "Organization", "name": "牛牛老師補給站" },
      "mainEntityOfPage": location.href
    });
    document.head.appendChild(ld);
  })();
</script>
