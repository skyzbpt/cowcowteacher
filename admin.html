<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台管理｜牛牛老師補給站</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="logo.PNG">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Huninn&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-corners"></div>

<!-- ===== 登入畫面 ===== -->
<div id="login-view" class="admin-login" style="display:none">
  <form class="login-card" id="login-form">
    <img src="logo.PNG" alt="牛牛老蘇補給站 logo" class="login-logo">
    <h1>後台管理登入</h1>
    <p class="login-hint" id="login-hint">請輸入後台密碼以管理文章</p>
    <input type="email" id="login-email" placeholder="管理者 email" autocomplete="username" style="display:none">
    <input type="password" id="login-pw" placeholder="後台密碼" autocomplete="current-password">
    <p class="login-error" id="login-error">密碼錯誤，請再試一次。</p>
    <button class="btn" type="submit">登入</button>
    <a class="login-back" href="index.html">← 回到網站首頁</a>
  </form>
</div>

<!-- ===== 後台儀表板 ===== -->
<div id="dash-view" style="display:none">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img class="brand-logo" src="logo.PNG" alt="牛牛老蘇補給站 logo">
        <span class="brand-text">
          <span class="brand-name">牛牛老蘇補給站</span>
          <span class="brand-slogan">後台管理</span>
        </span>
      </a>
      <nav class="main-nav">
        <a href="index.html" target="_blank">檢視網站 ↗</a>
        <a href="#" id="logout-btn">登出</a>
      </nav>
    </div>
  </header>

  <section>
    <div class="container">
      <div class="admin-topbar">
        <h1 class="section-title" style="text-align:left;margin:0">📋 文章管理後台</h1>
        <a class="btn" href="editor.html">✏️ 寫新文章</a>
      </div>

      <div class="stat-cards">
        <div class="stat-card">
          <span class="stat-num" id="stat-total">0</span>
          <span class="stat-label">文章總數</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="stat-latest">—</span>
          <span class="stat-label">最近更新</span>
        </div>
      </div>

      <div class="admin-panel">
        <h2 class="admin-panel-title">所有文章</h2>
        <div class="table-wrap">
          <table class="admin-table" id="admin-table">
            <thead>
              <tr><th>文章</th><th>日期</th><th class="col-actions">操作</th></tr>
            </thead>
            <tbody id="admin-tbody"></tbody>
          </table>
        </div>
        <div class="empty-posts" id="admin-empty" style="display:none">
          <p>目前還沒有文章，點右上角「寫新文章」開始吧！</p>
          <button class="btn btn-small btn-outline" id="seed-btn" style="display:none;margin-top:12px">📥 匯入預設文章（正向教養）</button>
        </div>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <p class="footer-copy">© 2026 牛牛老師補給站 × 天領健康教育｜後台管理</p>
    </div>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
<script src="posts.js"></script>
<script>
  (async function () {
    const loginView = document.getElementById("login-view");
    const dashView = document.getElementById("dash-view");
    const emailEl = document.getElementById("login-email");
    const pwEl = document.getElementById("login-pw");
    const errEl = document.getElementById("login-error");
    const hintEl = document.getElementById("login-hint");
    const backend = niuHasBackend();

    /* 依模式調整登入畫面：接後端要 email + 密碼 */
    if (backend) {
      emailEl.style.display = "";
      hintEl.textContent = "請以管理者 email 與密碼登入";
      if (window.NIU_CONFIG && NIU_CONFIG.ADMIN_EMAIL) emailEl.value = NIU_CONFIG.ADMIN_EMAIL;
    }

    function showLogin() {
      loginView.style.display = "flex";
      dashView.style.display = "none";
      (backend && !emailEl.value ? emailEl : pwEl).focus();
    }
    async function showDash() {
      loginView.style.display = "none";
      dashView.style.display = "block";
      await renderDash();
    }

    /* 登入表單 */
    document.getElementById("login-form").addEventListener("submit", async function (e) {
      e.preventDefault();
      errEl.style.display = "none";
      let ok = false, msg = "密碼錯誤，請再試一次。";
      if (backend) {
        const res = await niuLoginBackend(emailEl.value.trim(), pwEl.value);
        ok = res.ok;
        if (!ok) msg = "登入失敗：" + (res.message || "請確認 email 與密碼");
      } else {
        ok = niuLoginLocal(pwEl.value);
      }
      if (ok) {
        const next = new URLSearchParams(location.search).get("next");
        if (next) { location.href = decodeURIComponent(next); return; }
        await showDash();
      } else {
        errEl.textContent = msg;
        errEl.style.display = "block";
        pwEl.select();
      }
    });

    document.getElementById("logout-btn").addEventListener("click", function (e) {
      e.preventDefault();
      niuLogout();
    });

    /* 匯入預設文章 */
    document.getElementById("seed-btn").addEventListener("click", async function () {
      const btn = this;
      btn.disabled = true;
      btn.textContent = "匯入中…";
      try {
        await niuSeedDefault();
        await renderDash();
      } catch (err) {
        alert("匯入失敗：" + (err.message || err));
        btn.disabled = false;
        btn.textContent = "📥 匯入預設文章（正向教養）";
      }
    });

    /* 渲染儀表板 */
    async function renderDash() {
      const posts = await niuGetPosts();
      document.getElementById("stat-total").textContent = posts.length;
      document.getElementById("stat-latest").textContent = posts.length ? posts[0].date : "—";

      const tbody = document.getElementById("admin-tbody");
      const empty = document.getElementById("admin-empty");
      const table = document.getElementById("admin-table");
      const seedBtn = document.getElementById("seed-btn");
      if (!posts.length) {
        table.style.display = "none";
        empty.style.display = "block";
        seedBtn.style.display = backend ? "inline-block" : "none";
        return;
      }
      table.style.display = "";
      empty.style.display = "none";
      tbody.innerHTML = posts.map(function (p) {
        return '<tr>' +
          '<td class="col-title">' +
            '<span class="row-emoji">' + (p.emoji || "📝") + '</span>' +
            '<a href="article.html?id=' + encodeURIComponent(p.id) + '" target="_blank">' + p.title + '</a>' +
          '</td>' +
          '<td class="col-date">' + (p.date || "") + '</td>' +
          '<td class="col-actions">' +
            '<a class="btn btn-small btn-outline" href="editor.html?id=' + encodeURIComponent(p.id) + '">編輯</a>' +
            '<button class="btn btn-small btn-outline btn-danger" data-del="' + p.id + '" data-title="' + p.title.replace(/"/g, "&quot;") + '">刪除</button>' +
          '</td>' +
        '</tr>';
      }).join("");

      tbody.querySelectorAll("[data-del]").forEach(function (btn) {
        btn.addEventListener("click", async function () {
          if (!confirm("確定要刪除「" + btn.dataset.title + "」嗎？此動作無法復原。")) return;
          try {
            await niuDeletePost(btn.dataset.del);
            await renderDash();
          } catch (err) {
            alert("刪除失敗：" + (err.message || err));
          }
        });
      });
    }

    /* 進入頁面：已登入直接看儀表板，否則登入畫面 */
    if (await niuIsLoggedIn()) await showDash();
    else showLogin();
  })();
</script>
</body>
</html>
